<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>English Journal AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #EDEAE0;
    --card: #F7F5EC;
    --ink: #26323A;
    --ink-soft: #6B7178;
    --accent: #3E6259;
    --accent-soft: #DCE6DE;
    --highlight-soft: #F3E3C2;
    --line: #C9C2AE;
    --white: #FFFFFF;
    --danger: #A6503C;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    position: relative;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image: radial-gradient(var(--line) 0.6px, transparent 0.6px);
    background-size: 18px 18px;
    opacity: 0.35;
    pointer-events: none;
  }
  .kr { font-family: 'Noto Serif KR', serif; }
  .en { font-family: 'JetBrains Mono', monospace; }

  .wrap { max-width: 640px; margin: 0 auto; padding: 28px 20px 70px; position: relative; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; gap: 10px; }
  .header-left { display: flex; align-items: center; gap: 4px; }
  .header h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.3px; margin: 0; }
  .header p.sub { font-size: 12px; color: var(--ink-soft); margin: 3px 0 0; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--ink); display: flex; align-items: center; justify-content: center; padding: 6px; border-radius: 3px; }
  .icon-btn:hover { background: var(--card); }

  .btn {
    font-family: 'Noto Sans KR', sans-serif;
    border: 1.5px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    border-radius: 3px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.12s ease, opacity 0.12s ease;
  }
  .btn:hover { transform: translateY(-1px); opacity: 0.92; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--line); }
  .btn-ghost:hover { border-color: var(--ink); background: var(--card); }
  .btn-danger { color: var(--danger); border-color: var(--danger); }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 4px; box-shadow: 0 1px 0 var(--line); }

  .field-label { font-size: 12px; color: var(--ink-soft); display: block; margin-bottom: 8px; }
  .input, .textarea {
    font-family: 'Noto Serif KR', serif;
    background: var(--white);
    border: 1.5px solid var(--line);
    border-radius: 3px;
    padding: 12px 14px;
    color: var(--ink);
    font-size: 15px;
    width: 100%;
    outline: none;
  }
  .input:focus, .textarea:focus { border-color: var(--accent); }
  .textarea { line-height: 1.8; resize: vertical; }
  .input.mono { font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); margin-bottom: 16px; overflow-x: auto; }
  .tab { font-size: 13px; font-weight: 500; padding: 8px 14px; color: var(--ink-soft); border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .chip { display: inline-flex; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; background: var(--accent-soft); color: var(--accent); border-radius: 3px; padding: 5px 10px; margin: 3px; }
  .highlight { background: var(--highlight-soft); padding: 0 2px; }

  .photo-thumb { position: relative; width: 84px; height: 84px; }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 3px; border: 1px solid var(--line); }
  .photo-thumb button { position: absolute; top: -6px; right: -6px; background: var(--ink); color: var(--paper); border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; line-height: 1; }
  .photo-add { width: 84px; height: 84px; border-radius: 3px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; font-size: 11px; }

  .entry-row { padding: 14px; display: flex; gap: 12px; cursor: pointer; align-items: center; margin-bottom: 12px; }
  .entry-thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 3px; border: 1px solid var(--line); flex-shrink: 0; }
  .entry-thumb-fallback { width: 56px; height: 56px; border-radius: 3px; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--accent); font-size: 20px; }
  .entry-meta { min-width: 0; flex: 1; }
  .entry-meta .date { font-size: 11px; color: var(--ink-soft); margin: 0; }
  .entry-meta .title { font-family: 'Noto Serif KR', serif; font-size: 15px; font-weight: 600; margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-meta .snippet { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--ink-soft); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .scene-list { display: flex; flex-direction: column; gap: 14px; }
  .scene-card { border: 1px solid var(--line); border-radius: 4px; overflow: hidden; background: var(--white); }
  .scene-img-wrap { width: 100%; aspect-ratio: 16 / 9; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .scene-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scene-placeholder { font-size: 26px; opacity: 0.5; }
  .scene-caption { padding: 10px 12px 4px; font-size: 13.5px; line-height: 1.75; }
  .scene-error { padding: 0 12px 10px; font-size: 11.5px; color: var(--danger); }

  .flash-card { padding: 26px 18px; text-align: center; background: var(--paper); }
  .flash-tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.4px; color: var(--accent); margin: 0 0 10px; font-weight: 600; }
  .flash-headline { font-size: 18px; font-weight: 700; margin: 0 0 6px; }
  .flash-sub { font-size: 13.5px; color: var(--ink-soft); margin: 0; line-height: 1.6; }

  .err { color: var(--danger); font-size: 13px; margin-bottom: 12px; }
  .empty { padding: 40px 24px; text-align: center; }
  .empty p { font-size: 15px; color: var(--ink-soft); line-height: 1.8; }

  .kb-modal { max-width: 480px; width: 100%; padding: 18px; }
  .kb-modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .kb-modal-title { font-size: 15px; font-weight: 600; margin: 0; }
  .kb-canvas-wrap { width: 100%; aspect-ratio: 16 / 9; background: #1A2420; border-radius: 4px; overflow: hidden; position: relative; }
  .kb-canvas-wrap canvas { width: 100%; height: 100%; display: block; }
  .kb-controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 14px; }
  .kb-controls .icon-btn { font-size: 20px; }
  .kb-dots { display: flex; justify-content: center; gap: 5px; margin-top: 10px; flex-wrap: wrap; max-width: 100%; }
  .kb-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--line); flex-shrink: 0; }
  .kb-dot.active { background: var(--accent); }
  .kb-lang-row { display: flex; gap: 6px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
  .kb-chip { font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 6px 12px; border-radius: 14px; border: 1.5px solid var(--line); background: transparent; color: var(--ink-soft); cursor: pointer; }
  .kb-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .kb-chip:disabled { opacity: 0.5; cursor: not-allowed; }
  .kb-export-status { margin-top: 16px; text-align: center; }
  .kb-export-label { font-size: 13px; color: var(--ink-soft); margin: 0 0 8px; }
  .kb-progress-track { width: 100%; height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; margin-bottom: 14px; }
  .kb-progress-fill { height: 100%; background: var(--accent); width: 0%; }
  .kb-result-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
  .kb-note { font-size: 11.5px; color: var(--ink-soft); margin-top: 10px; text-align: center; line-height: 1.6; }


  @keyframes dotpulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
  .typing { display: inline-flex; gap: 3px; align-items: center; }
  .typing span.dot { font-family: 'JetBrains Mono', monospace; animation: dotpulse 1.1s ease-in-out infinite; }
  .typing span.dot:nth-child(2) { animation-delay: 0.15s; }
  .typing span.dot:nth-child(3) { animation-delay: 0.3s; }
  .typing span.dot:nth-child(4) { animation-delay: 0.45s; }
  .typing span.dot:nth-child(5) { animation-delay: 0.6s; }
  .typing .label { margin-left: 10px; font-size: 13px; color: var(--ink-soft); font-family: 'Noto Sans KR', sans-serif; }

  .fade-in { animation: fadein 0.35s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(38,50,58,0.45); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
  .modal { background: var(--card); border-radius: 6px; padding: 24px; max-width: 420px; width: 100%; border: 1px solid var(--line); }
  .modal h2 { font-size: 16px; margin: 0 0 6px; }
  .modal p.desc { font-size: 12.5px; color: var(--ink-soft); margin: 0 0 18px; line-height: 1.6; }
  .modal .row { margin-bottom: 14px; }
  .modal .row label { font-size: 12px; color: var(--ink-soft); display: block; margin-bottom: 6px; }
  .modal .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

  .spin { display: inline-block; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { height: 6px; width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

  @media (prefers-reduced-motion: reduce) {
    .typing span.dot { animation: none; opacity: 1; }
    .fade-in { animation: none; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function () {
  "use strict";

  var MAX_PHOTOS = Infinity; // no fixed count limit — see TOTAL_PHOTO_BYTES_LIMIT below
  var TOTAL_PHOTO_BYTES_LIMIT = 4 * 1024 * 1024; // ~4MB — Vercel's serverless function request body is hard-capped at 4.5MB total, so this leaves headroom for the JSON wrapper, diary text, and headers
  var MAX_DIM = 900;
  var ENTRIES_KEY = "ejai_entries";
  var SETTINGS_KEY = "ejai_settings";

  var state = {
    view: "home", // home | new | detail | settings
    entries: [],
    activeEntry: null,
    newEntry: { title: "", korean: "", photos: [] },
    generating: false,
    genErr: "",
    result: null,
    saving: false,
    resultTab: "easy",
    settings: { appSecret: "", model: "gemini-flash-latest" },
    showSettings: false,
    player: {
      active: false,
      scenes: [],
      subtitleLang: "ko", // ko | easy | natural
      index: 0,
      playing: false,
      exporting: false,
      exportDone: false,
      exportError: "",
      videoUrl: "",
      videoExt: "webm",
      muted: false,
    },
  };

  function loadEntries() {
    try {
      var raw = localStorage.getItem(ENTRIES_KEY);
      state.entries = raw ? JSON.parse(raw) : [];
    } catch (e) { state.entries = []; }
  }
  function saveEntries() {
    localStorage.setItem(ENTRIES_KEY, JSON.stringify(state.entries));
  }
  function loadSettings() {
    try {
      var raw = localStorage.getItem(SETTINGS_KEY);
      if (raw) state.settings = Object.assign(state.settings, JSON.parse(raw));
    } catch (e) {}
  }
  function saveSettings() {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings));
  }

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function escapeHtml(str) {
    if (str == null) return "";
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function resizeImageFile(file) {
    return new Promise(function (resolve, reject) {
      var reader = new FileReader();
      reader.onerror = function () { reject(new Error("파일을 읽을 수 없습니다.")); };
      reader.onload = function () {
        var img = new Image();
        img.onerror = function () { reject(new Error("이미지를 불러올 수 없습니다.")); };
        img.onload = function () {
          var width = img.width, height = img.height;
          if (width > MAX_DIM || height > MAX_DIM) {
            var scale = MAX_DIM / Math.max(width, height);
            width = Math.round(width * scale);
            height = Math.round(height * scale);
          }
          var canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          var ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL("image/jpeg", 0.72));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function dataUrlToParts(dataUrl) {
    var idx = dataUrl.indexOf(",");
    var meta = dataUrl.slice(0, idx);
    var data = dataUrl.slice(idx + 1);
    var m = meta.match(/data:(.*);base64/);
    return { mime: m ? m[1] : "image/jpeg", data: data };
  }

  function totalPhotoBytes(photos) {
    // Rough size of the base64 payload in bytes (base64 is ~4/3 the size of raw bytes,
    // but since we only need an estimate for a UI hint, string length is close enough).
    return photos.reduce(function (sum, p) { return sum + p.length; }, 0);
  }

  function photoUsageLabel(photos) {
    var used = totalPhotoBytes(photos);
    var usedMb = (used / (1024 * 1024)).toFixed(1);
    var limitMb = (TOTAL_PHOTO_BYTES_LIMIT / (1024 * 1024)).toFixed(0);
    var count = photos.length;
    var countLabel = count > 0 ? count + "장 첨부됨 · " : "";
    return countLabel + "사진은 개수 제한 없이 첨부할 수 있어요 (용량 약 " + usedMb + "MB / " + limitMb + "MB 사용 중).";
  }

  // The Gemini API key is never present in this file or in the browser at all — it lives
  // only in the server's GEMINI_API_KEY environment variable (see /api/generate.js). This
  // page just calls our own server endpoint, which calls Gemini on our behalf.
  function callServer(korean, photos) {
    var model = state.settings.model || "gemini-flash-latest";
    return fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-app-secret": state.settings.appSecret || "",
      },
      body: JSON.stringify({ korean: korean, photos: photos, model: model }),
    }).then(function (res) {
      return res.json().then(function (data) {
        if (!res.ok) {
          throw new Error((data && data.error) || ("요청에 실패했습니다 (" + res.status + ").") );
        }
        return data;
      });
    }).then(function (data) {
      var text = data.text || "";
      if (!text) throw new Error("AI 응답이 비어있습니다.");
      var cleaned = text.replace(/```json|```/g, "").trim();
      var start = cleaned.indexOf("{");
      var end = cleaned.lastIndexOf("}");
      var jsonStr = start >= 0 ? cleaned.slice(start, end + 1) : cleaned;
      return JSON.parse(jsonStr);
    });
  }

  // ---------------------------------------------------------------------
  // Rendering
  // ---------------------------------------------------------------------

  var app = document.getElementById("app");

  // Not part of `state` because these are live rendering handles (canvas, recorder,
  // in-flight animation frame) rather than serializable UI state.
  var activeResultForPlayer = null;
  var playerCanvas = null, playerCtx = null, playerImages = [];
  var playerRAF = null, playerElapsed = 0, playerLastTs = null;
  var mediaRecorder = null, recordedChunks = [], exportedVideoBlob = null;
  var audioCtx = null, audioMasterGain = null, audioDestNode = null;
  var audioScheduler = null, audioNextPadTime = 0, audioNextPluckTime = 0;
  var audioMuted = false;
  var transitionNoteIndex = 0;

  function render() {
    var html = '<div class="wrap">';
    html += renderHeader();
    if (state.view === "home") html += renderHome();
    else if (state.view === "new") html += renderNew();
    else if (state.view === "detail") html += renderDetail();
    html += "</div>";
    if (state.showSettings) html += renderSettingsModal();
    if (state.player.active) html += renderPlayerModal();
    app.innerHTML = html;
    bindEvents();
  }

  function renderHeader() {
    var back = state.view !== "home"
      ? '<button class="icon-btn" data-action="go-home" aria-label="뒤로 가기">←</button>'
      : "";
    var newBtn = state.view === "home"
      ? '<button class="btn" data-action="start-new">＋ 새 기록</button>'
      : "";
    return (
      '<div class="header">' +
        '<div class="header-left">' + back +
          '<div>' +
            '<h1 class="kr">English Journal <span class="en" style="color:var(--accent)">AI</span></h1>' +
            '<p class="sub">한국어로 기록하면 영어 사고를 만들어주는 AI 영어 저널</p>' +
          "</div>" +
        "</div>" +
        '<div style="display:flex; gap:6px; align-items:center;">' +
          newBtn +
          '<button class="icon-btn" data-action="open-settings" aria-label="설정" title="설정">⚙</button>' +
        "</div>" +
      "</div>"
    );
  }

  function renderHome() {
    if (state.entries.length === 0) {
      return (
        '<div class="fade-in empty card">' +
          '<p class="kr">아직 기록이 없어요.<br>오늘 있었던 일을 한국어로 적어보세요.</p>' +
          '<button class="btn" data-action="start-new">＋ 첫 기록 시작하기</button>' +
        "</div>"
      );
    }
    var rows = state.entries.map(function (e) {
      var thumb = e.photos && e.photos[0]
        ? '<img class="entry-thumb" src="' + e.photos[0] + '" alt="" />'
        : '<div class="entry-thumb-fallback">📔</div>';
      return (
        '<div class="card entry-row" data-action="open-entry" data-id="' + e.id + '">' +
          thumb +
          '<div class="entry-meta">' +
            '<p class="date">' + escapeHtml(e.date) + "</p>" +
            '<p class="title kr">' + escapeHtml(e.title) + "</p>" +
            '<p class="snippet en">' + escapeHtml(e.naturalEnglish || "") + "</p>" +
          "</div>" +
        "</div>"
      );
    }).join("");
    return '<div class="fade-in">' + rows + "</div>";
  }

  function renderPhotoStrip(photos, removable) {
    var thumbs = photos.map(function (p, i) {
      var removeBtn = removable
        ? '<button data-action="remove-photo" data-idx="' + i + '" aria-label="사진 삭제">×</button>'
        : "";
      return '<div class="photo-thumb"><img src="' + p + '" alt="" />' + removeBtn + "</div>";
    }).join("");
    var addBtn = removable && photos.length < MAX_PHOTOS
      ? '<button class="btn-ghost photo-add" data-action="add-photo">📷<span>사진 추가</span></button>'
      : "";
    return '<div style="display:flex; gap:10px; flex-wrap:wrap;">' + thumbs + addBtn + "</div>";
  }

  function renderNew() {
    if (state.result) {
      return renderResultBlock({
        result: state.result,
        korean: state.newEntry.korean,
        photos: state.newEntry.photos,
        title: state.newEntry.title,
        readOnly: false,
      });
    }
    var err = state.genErr ? '<p class="err">' + escapeHtml(state.genErr) + "</p>" : "";
    var genBtnContent = state.generating
      ? '<span class="typing"><span class="dot">·</span><span class="dot">·</span><span class="dot">·</span><span class="dot">·</span><span class="dot">·</span><span class="label">영어로 옮기는 중</span></span>'
      : "✨ 영어 일기 만들기";
    return (
      '<div class="fade-in">' +
        '<div style="margin-bottom:18px;">' +
          '<label class="field-label">사진 (선택)</label>' +
          renderPhotoStrip(state.newEntry.photos, true) +
          '<input type="file" id="photo-input" accept="image/*" multiple style="display:none" />' +
          '<p style="font-size:11.5px; color:var(--ink-soft); margin-top:6px;">' + photoUsageLabel(state.newEntry.photos) + "</p>" +
        "</div>" +
        '<div style="margin-bottom:18px;">' +
          '<label class="field-label">오늘 있었던 일을 한국어로 적어보세요</label>' +
          '<textarea class="textarea kr" id="korean-input" rows="8" placeholder="오늘은 전시를 다녀왔다. 사람이 적어서 좋았다...">' + escapeHtml(state.newEntry.korean) + "</textarea>" +
        "</div>" +
        err +
        '<button class="btn" data-action="generate" ' + (state.generating ? "disabled" : "") + ">" + genBtnContent + "</button>" +
      "</div>"
    );
  }

  function renderDetail() {
    if (!state.activeEntry) return "";
    var e = state.activeEntry;
    var block = renderResultBlock({ result: e, korean: e.korean, photos: e.photos, title: e.title, readOnly: true });
    return (
      "<div>" + block +
        '<div style="margin-top:20px; display:flex; justify-content:flex-end;">' +
          '<button class="btn-ghost btn-danger" data-action="delete-entry" data-id="' + e.id + '">🗑 삭제하기</button>' +
        "</div>" +
      "</div>"
    );
  }

  function renderExpressionList(list, phraseClass, meaningClass) {
    var items = list || [];
    if (items.length === 0) {
      return '<p style="font-size:13px; color:var(--ink-soft);">추출된 표현이 없어요.</p>';
    }
    return '<div style="display:flex; flex-direction:column; gap:12px;">' +
      items.map(function (e) {
        // Backward-compatible with entries saved before "meaning" was added (plain string array).
        var phrase = typeof e === "string" ? e : (e && e.phrase) || "";
        var meaning = typeof e === "string" ? "" : (e && e.meaning) || "";
        return (
          '<div style="border-bottom:1px dashed var(--line); padding-bottom:10px;">' +
            '<span class="' + phraseClass + '" style="font-weight:600; font-size:14.5px;">' + escapeHtml(phrase) + "</span>" +
            (meaning ? '<p class="' + meaningClass + '" style="font-size:13px; color:var(--ink-soft); margin:4px 0 0;">' + escapeHtml(meaning) + "</p>" : "") +
          "</div>"
        );
      }).join("") +
    "</div>";
  }

  function renderVocabList(list, wordClass, meaningClass) {
    var items = list || [];
    if (items.length === 0) {
      return '<p style="font-size:13px; color:var(--ink-soft);">항목이 없어요.</p>';
    }
    return '<div style="display:flex; flex-direction:column; gap:10px;">' +
      items.map(function (v) {
        return (
          '<div style="display:flex; justify-content:space-between; gap:12px; border-bottom:1px dashed var(--line); padding-bottom:8px;">' +
            '<span class="' + wordClass + '" style="font-weight:600; font-size:14px;">' + escapeHtml(v.word) + "</span>" +
            '<span class="' + meaningClass + '" style="font-size:13.5px; color:var(--ink-soft); text-align:right;">' + escapeHtml(v.meaning) + "</span>" +
          "</div>"
        );
      }).join("") +
    "</div>";
  }

  // Builds the list actually usable in the slideshow/player: diary scenes that got a
  // successfully generated image, plus "flashcard" slides for expressions/vocabulary
  // (no AI image needed — these are drawn as typographic cards, so they cost nothing
  // extra to generate and are always available even if scene image generation failed).
  function buildIntroScene(result) {
    var script = result.koreanSpeakScript;
    if (!script || !String(script).trim()) return [];
    return [{ kind: "intro", text: script }];
  }

  function buildPhotoScenes(result) {
    var list = [];
    (result.scenes || []).forEach(function (s) {
      if (s && s.image) {
        list.push({ kind: "photo", text: s.text, easyCaption: s.easyCaption, naturalCaption: s.naturalCaption, image: s.image });
      }
    });
    return list;
  }

  // lang === "ko" -> only Korean expr/vocab flashcards. lang === "easy"/"natural" -> only
  // English expr/vocab flashcards. lang == null -> everything (used by the static Scenes tab,
  // which has no language selector and should just show all of it for browsing).
  function buildFlashcards(result, lang) {
    var list = [];
    var includeEnglish = lang == null || lang === "easy" || lang === "natural";
    var includeKorean = lang == null || lang === "ko";

    if (includeEnglish) {
      (result.expressions || []).forEach(function (e) {
        var phrase = typeof e === "string" ? e : (e && e.phrase) || "";
        var meaning = typeof e === "string" ? "" : (e && e.meaning) || "";
        if (phrase) list.push({ kind: "expr", headline: phrase, sub: meaning });
      });
      (result.vocabulary || []).forEach(function (v) {
        if (v && v.word) list.push({ kind: "vocab", headline: v.word, sub: v.meaning || "" });
      });
    }
    if (includeKorean) {
      (result.koreanExpressions || []).forEach(function (e) {
        var phrase = typeof e === "string" ? e : (e && e.phrase) || "";
        var meaning = typeof e === "string" ? "" : (e && e.meaning) || "";
        if (phrase) list.push({ kind: "kr-expr", headline: phrase, sub: meaning });
      });
      (result.koreanVocabulary || []).forEach(function (v) {
        if (v && v.word) list.push({ kind: "kr-vocab", headline: v.word, sub: v.meaning || "" });
      });
    }
    return list;
  }

  // The intro (Korean speak script) always comes first, regardless of subtitle language —
  // it's the opening of the video, not tied to the easy/natural/Korean study-language toggle.
  function buildPlayableScenes(result, lang) {
    return buildIntroScene(result).concat(buildPhotoScenes(result)).concat(buildFlashcards(result, lang));
  }

  function renderScenes(result) {
    var scenes = result.scenes || [];
    var expressions = result.expressions || [];
    var vocabulary = result.vocabulary || [];
    var hasIntro = !!(result.koreanSpeakScript && String(result.koreanSpeakScript).trim());
    if (scenes.length === 0 && expressions.length === 0 && vocabulary.length === 0 && !hasIntro) {
      return '<p style="font-size:13px; color:var(--ink-soft);">생성된 장면이 없어요.</p>';
    }

    var playable = buildPlayableScenes(result, null);
    var playBtn = playable.length > 0
      ? '<button class="btn" style="margin-bottom:14px;" data-action="open-player">▶ 슬라이드쇼로 보기</button>'
      : "";

    var introCard = hasIntro
      ? '<div class="scene-card flash-card">' +
          '<p class="flash-tag en">오프닝 · INTRO</p>' +
          '<p class="flash-sub kr" style="font-size:14px; line-height:1.8;">' + escapeHtml(result.koreanSpeakScript) + "</p>" +
        "</div>"
      : "";

    var sceneCards = scenes.map(function (s) {
      var media = s.image
        ? '<div class="scene-img-wrap"><img src="' + s.image + '" alt="" /></div>'
        : '<div class="scene-img-wrap"><span class="scene-placeholder">🖼</span></div>';
      var errLine = s.image
        ? ""
        : '<p class="scene-error">' + escapeHtml(s.error || "이미지를 생성하지 못했어요.") + "</p>";
      return (
        '<div class="scene-card">' +
          media +
          '<p class="scene-caption kr">' + escapeHtml(s.text) + "</p>" +
          errLine +
        "</div>"
      );
    }).join("");

    var flashCards = playable.filter(function (s) { return s.kind !== "photo" && s.kind !== "intro"; }).map(function (s) {
      var isKr = s.kind === "kr-expr" || s.kind === "kr-vocab";
      var tagLabel =
        s.kind === "expr" ? "EXPRESSION · 표현" :
        s.kind === "vocab" ? "VOCABULARY · 단어" :
        s.kind === "kr-expr" ? "한국어 표현 · KOREAN" :
        "한국어 단어 · KOREAN";
      var headlineClass = isKr ? "kr" : "en";
      var subClass = isKr ? "en" : "kr";
      return (
        '<div class="scene-card flash-card">' +
          '<p class="flash-tag en">' + tagLabel + "</p>" +
          '<p class="flash-headline ' + headlineClass + '">' + escapeHtml(s.headline) + "</p>" +
          (s.sub ? '<p class="flash-sub ' + subClass + '">' + escapeHtml(s.sub) + "</p>" : "") +
        "</div>"
      );
    }).join("");

    return playBtn + '<div class="scene-list">' + introCard + sceneCards + flashCards + "</div>";
  }

  function renderResultBlock(opts) {
    var result = opts.result, korean = opts.korean, photos = opts.photos || [], readOnly = opts.readOnly;
    activeResultForPlayer = result;
    var titleField = !readOnly
      ? '<div style="margin-bottom:16px;"><label class="field-label">제목</label>' +
        '<input class="input" id="title-input" placeholder="이 기록의 제목을 붙여주세요" value="' + escapeHtml(opts.title) + '" /></div>'
      : "";
    var photoStrip = photos.length > 0
      ? '<div style="display:flex; gap:8px; margin-bottom:16px; overflow-x:auto;">' +

        "</div>"
      : "";

    var tabs = [
      { id: "easy", label: "Easy English" },
      { id: "natural", label: "Natural English" },
      { id: "expr", label: "Expressions" },
      { id: "vocab", label: "Vocabulary" },
      { id: "kr-expr", label: "한국어 표현" },
      { id: "kr-vocab", label: "한국어 단어" },
      { id: "script", label: "Speak Script" },
      { id: "kr-script", label: "한국어 스크립트" },
      { id: "scenes", label: "Scenes" },
    ];
    var tabsHtml = tabs.map(function (t) {
      return '<div class="tab ' + (state.resultTab === t.id ? "active" : "") + '" data-action="set-tab" data-tab="' + t.id + '">' + t.label + "</div>";
    }).join("");

    var body = "";
    if (state.resultTab === "easy") {
      body = '<p class="en" style="font-size:15px; line-height:1.9; white-space:pre-wrap;">' + escapeHtml(result.easyEnglish) + "</p>";
    } else if (state.resultTab === "natural") {
      body = '<p class="en" style="font-size:15px; line-height:1.9; white-space:pre-wrap;">' + escapeHtml(result.naturalEnglish) + "</p>";
    } else if (state.resultTab === "expr") {
      body = renderExpressionList(result.expressions, "en", "kr");
    } else if (state.resultTab === "vocab") {
      body = renderVocabList(result.vocabulary, "en", "kr");
    } else if (state.resultTab === "kr-expr") {
      body = renderExpressionList(result.koreanExpressions, "kr", "en");
    } else if (state.resultTab === "kr-vocab") {
      body = renderVocabList(result.koreanVocabulary, "kr", "en");
    } else if (state.resultTab === "script") {
      body = '<p class="en" style="font-size:14.5px; line-height:2; white-space:pre-wrap;">' + escapeHtml(result.speakScript) + "</p>";
    } else if (state.resultTab === "kr-script") {
      body = '<p class="kr" style="font-size:15px; line-height:1.9; white-space:pre-wrap;">' + escapeHtml(result.koreanSpeakScript) + "</p>";
    } else if (state.resultTab === "scenes") {
      body = renderScenes(result);
    }

    var metaBlock = "";
    if (result.youtubeTitle || (result.hashtags && result.hashtags.length)) {
      var titleLine = result.youtubeTitle
        ? '<p style="font-size:13px;"><span style="color:var(--ink-soft)">제목 제안 · </span><span class="highlight en">' + escapeHtml(result.youtubeTitle) + "</span></p>"
        : "";
      var tagLine = result.hashtags && result.hashtags.length
        ? '<div>' + result.hashtags.map(function (h) { return '<span class="en" style="font-size:12px; color:var(--accent); margin-right:8px;">#' + escapeHtml(String(h).replace(/^#/, "")) + "</span>"; }).join("") + "</div>"
        : "";
      metaBlock = '<div style="margin-top:16px; display:flex; flex-direction:column; gap:8px;">' + titleLine + tagLine + "</div>";
    }

    var actions = !readOnly
      ? '<div style="display:flex; gap:10px; margin-top:22px;">' +
          '<button class="btn" data-action="save-entry" ' + (state.saving ? "disabled" : "") + ">" + (state.saving ? '<span class="spin">↻</span> 저장 중' : "저장하기") + "</button>" +
          '<button class="btn-ghost" data-action="discard-result" ' + (state.saving ? "disabled" : "") + ">다시 쓰기</button>" +
        "</div>"
      : "";

    return (
      '<div class="fade-in">' +
        titleField + photoStrip +
        '<div class="card" style="padding:16px; margin-bottom:16px;">' +
          '<p style="font-size:11px; color:var(--accent); font-weight:600; letter-spacing:0.4px; margin-bottom:6px;">KOREAN · 원문</p>' +
          '<p class="kr" style="font-size:15px; line-height:1.9; white-space:pre-wrap;">' + escapeHtml(korean) + "</p>" +
        "</div>" +
        '<div class="tabs">' + tabsHtml + "</div>" +
        '<div class="card" style="padding:18px; min-height:140px;">' + body + "</div>" +
        metaBlock + actions +
      "</div>"
    );
  }

  function renderSettingsModal() {
    return (
      '<div class="modal-backdrop" data-action="close-settings-backdrop">' +
        '<div class="modal" onclick="event.stopPropagation()">' +
          "<h2>설정</h2>" +
          '<p class="desc">Gemini API 키는 이 화면에 입력하지 않아요 — 서버(GEMINI_API_KEY 환경변수)에만 저장되어 있고 브라우저로 절대 전달되지 않아요. 서버에 앱 비밀번호(APP_SECRET)를 설정해두었다면 아래에 입력해주세요.</p>' +
          '<div class="row"><label>앱 비밀번호 (서버에 APP_SECRET을 설정한 경우에만)</label><input class="input mono" id="settings-secret" type="password" placeholder="비밀번호" value="' + escapeHtml(state.settings.appSecret) + '" /></div>' +
          '<div class="row"><label>모델 이름</label><input class="input mono" id="settings-model" type="text" placeholder="gemini-flash-latest" value="' + escapeHtml(state.settings.model) + '" /></div>' +
          '<div class="actions">' +
            '<button class="btn-ghost" data-action="close-settings">취소</button>' +
            '<button class="btn" data-action="save-settings">저장</button>' +
          "</div>" +
        "</div>" +
      "</div>"
    );
  }

  // ---------------------------------------------------------------------
  // Scene player: Ken Burns slideshow, 3-language subtitles, MP4/WebM export
  // ---------------------------------------------------------------------
  //
  // Rendering model: the rest of this app re-renders the whole #app innerHTML
  // string on every state change. That approach is fine for static UI, but it
  // would destroy the <canvas> element (and any in-flight MediaRecorder/rAF
  // loop tied to it) on every frame if used during playback. So the player
  // only calls the global render() at discrete transitions (open, close,
  // start export, export finished) — every other click (play/pause, prev/
  // next, subtitle language) mutates state and patches just the relevant DOM
  // nodes directly, leaving the canvas untouched. The animation loop itself
  // (stepPlayer) never calls render().

  function getSceneCaption(scene, lang) {
    if (lang === "easy") return scene.easyCaption || scene.text || "";
    if (lang === "natural") return scene.naturalCaption || scene.text || "";
    return scene.text || "";
  }

  function getLangLabel(lang) {
    if (lang === "easy") return "EASY ENGLISH";
    if (lang === "natural") return "NATURAL ENGLISH";
    return "한국어";
  }

  function computeSceneDurationMs(caption, lang) {
    var perChar = lang === "ko" ? 110 : 70;
    var ms = 1200 + caption.length * perChar;
    return Math.max(3200, Math.min(9000, ms));
  }

  function easeInOutQuad(t) {
    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
  }

  function getKenBurnsVariant(index) {
    var variants = [
      { s0: 1.0, s1: 1.18, x0: 0.5, y0: 0.5, x1: 0.5, y1: 0.5 },
      { s0: 1.18, s1: 1.0, x0: 0.4, y0: 0.4, x1: 0.6, y1: 0.6 },
      { s0: 1.0, s1: 1.16, x0: 0.35, y0: 0.5, x1: 0.65, y1: 0.5 },
      { s0: 1.16, s1: 1.0, x0: 0.65, y0: 0.5, x1: 0.35, y1: 0.5 },
    ];
    return variants[index % variants.length];
  }

  function wrapCanvasText(ctx, text, maxWidth) {
    var words = String(text).split(/\s+/).filter(Boolean);
    var lines = [];
    var current = "";
    words.forEach(function (word) {
      var test = current ? current + " " + word : word;
      if (ctx.measureText(test).width > maxWidth && current) {
        lines.push(current);
        current = word;
      } else {
        current = test;
      }
    });
    if (current) lines.push(current);
    return lines;
  }

  function drawFlashcardFrame(scene, t) {
    var ctx = playerCtx;
    var W = playerCanvas.width, H = playerCanvas.height;
    var isKr = scene.kind === "kr-expr" || scene.kind === "kr-vocab";
    var headlineFont = isKr ? "'Noto Serif KR', serif" : "'JetBrains Mono', monospace";
    var subFont = isKr ? "'JetBrains Mono', monospace" : "'Noto Serif KR', serif";

    ctx.fillStyle = "#EDEAE0"; // paper
    ctx.fillRect(0, 0, W, H);

    var te = easeInOutQuad(Math.min(1, t / 0.35));
    var scale = 0.96 + 0.04 * te;

    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.scale(scale, scale);
    ctx.translate(-W / 2, -H / 2);
    ctx.textAlign = "center";
    ctx.textBaseline = "alphabetic";

    var tagText =
      scene.kind === "expr" ? "EXPRESSION · 표현" :
      scene.kind === "vocab" ? "VOCABULARY · 단어" :
      scene.kind === "kr-expr" ? "한국어 표현 · KOREAN" :
      "한국어 단어 · KOREAN";
    ctx.font = "600 " + Math.round(W * 0.02) + "px 'JetBrains Mono', monospace";
    ctx.fillStyle = "#3E6259";
    ctx.fillText(tagText, W / 2, H * 0.34);

    ctx.strokeStyle = "#C9C2AE";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(W * 0.42, H * 0.39);
    ctx.lineTo(W * 0.58, H * 0.39);
    ctx.stroke();

    var headlineSize = Math.round(W * (isKr ? 0.056 : 0.052));
    ctx.font = (isKr ? "600 " : "700 ") + headlineSize + "px " + headlineFont;
    ctx.fillStyle = "#26323A";
    var headlineLines = wrapCanvasText(ctx, scene.headline || "", W * 0.8).slice(0, 2);
    var lineHeight1 = headlineSize * 1.3;
    var startY1 = H * 0.5;
    headlineLines.forEach(function (line, i) {
      ctx.fillText(line, W / 2, startY1 + i * lineHeight1);
    });

    if (scene.sub) {
      var subSize = Math.round(W * (isKr ? 0.024 : 0.026));
      ctx.font = "500 " + subSize + "px " + subFont;
      ctx.fillStyle = "#6B7178";
      var subLines = wrapCanvasText(ctx, scene.sub, W * 0.7).slice(0, 2);
      var lineHeight2 = subSize * 1.6;
      var startY2 = startY1 + (headlineLines.length - 1) * lineHeight1 + headlineSize * 1.5;
      subLines.forEach(function (line, i) {
        ctx.fillText(line, W / 2, startY2 + i * lineHeight2);
      });
    }

    ctx.restore();
    ctx.textAlign = "left";
  }

  function drawIntroFrame(scene, t) {
    var ctx = playerCtx;
    var W = playerCanvas.width, H = playerCanvas.height;

    ctx.fillStyle = "#EDEAE0"; // paper
    ctx.fillRect(0, 0, W, H);

    var te = easeInOutQuad(Math.min(1, t / 0.35));
    var scale = 0.97 + 0.03 * te;

    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.scale(scale, scale);
    ctx.translate(-W / 2, -H / 2);
    ctx.textAlign = "center";
    ctx.textBaseline = "alphabetic";

    ctx.font = "600 " + Math.round(W * 0.02) + "px 'JetBrains Mono', monospace";
    ctx.fillStyle = "#3E6259";
    ctx.fillText("오프닝 · INTRO", W / 2, H * 0.24);

    ctx.strokeStyle = "#C9C2AE";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(W * 0.42, H * 0.28);
    ctx.lineTo(W * 0.58, H * 0.28);
    ctx.stroke();

    var bodySize = Math.round(W * 0.026);
    ctx.font = "500 " + bodySize + "px 'Noto Serif KR', serif";
    ctx.fillStyle = "#26323A";
    var lines = wrapCanvasText(ctx, scene.text || "", W * 0.78).slice(0, 7);
    var lineHeight = bodySize * 1.7;
    var totalHeight = (lines.length - 1) * lineHeight;
    var startY = H / 2 - totalHeight / 2 + bodySize * 0.3;
    lines.forEach(function (line, i) {
      ctx.fillText(line, W / 2, startY + i * lineHeight);
    });

    ctx.restore();
    ctx.textAlign = "left";
  }

  function drawPlayerFrame(scene, t, index) {
    if (!playerCtx || !playerCanvas) return;
    if (scene.kind === "intro") {
      drawIntroFrame(scene, t);
      return;
    }
    if (scene.kind === "expr" || scene.kind === "vocab" || scene.kind === "kr-expr" || scene.kind === "kr-vocab") {
      drawFlashcardFrame(scene, t);
      return;
    }
    var ctx = playerCtx;
    var W = playerCanvas.width, H = playerCanvas.height;

    ctx.fillStyle = "#1A2420";
    ctx.fillRect(0, 0, W, H);

    var img = playerImages[index];
    if (img && img.complete && img.naturalWidth) {
      var v = getKenBurnsVariant(index);
      var te = easeInOutQuad(t);
      var scale = v.s0 + (v.s1 - v.s0) * te;
      var fx = v.x0 + (v.x1 - v.x0) * te;
      var fy = v.y0 + (v.y1 - v.y0) * te;

      var baseScale = Math.max(W / img.naturalWidth, H / img.naturalHeight);
      var eff = baseScale * scale;
      var dw = img.naturalWidth * eff, dh = img.naturalHeight * eff;
      var dx = W / 2 - img.naturalWidth * fx * eff;
      var dy = H / 2 - img.naturalHeight * fy * eff;
      dx = Math.min(0, Math.max(W - dw, dx));
      dy = Math.min(0, Math.max(H - dh, dy));
      ctx.drawImage(img, dx, dy, dw, dh);
    }

    var lang = state.player.subtitleLang;
    var caption = getSceneCaption(scene, lang);
    if (caption) {
      var bandH = Math.round(H * 0.26);
      var grad = ctx.createLinearGradient(0, H - bandH, 0, H);
      grad.addColorStop(0, "rgba(20,24,20,0)");
      grad.addColorStop(0.45, "rgba(20,24,20,0.65)");
      grad.addColorStop(1, "rgba(20,24,20,0.8)");
      ctx.fillStyle = grad;
      ctx.fillRect(0, H - bandH, W, bandH);

      var pad = W * 0.06;
      var maxWidth = W - pad * 2;
      var isKo = lang === "ko";
      var fontSize = Math.round(W * 0.032);
      var fontFamily = isKo ? "'Noto Serif KR', serif" : "'JetBrains Mono', monospace";
      ctx.font = (isKo ? "600 " : "500 ") + fontSize + "px " + fontFamily;
      ctx.textBaseline = "alphabetic";

      var lines = wrapCanvasText(ctx, caption, maxWidth).slice(0, 3);
      var lineHeight = fontSize * 1.5;
      var startY = H - pad * 0.9 - (lines.length - 1) * lineHeight;

      ctx.font = "600 " + Math.round(W * 0.018) + "px 'JetBrains Mono', monospace";
      ctx.fillStyle = "rgba(220, 230, 222, 0.75)";
      ctx.fillText(getLangLabel(lang), pad, startY - lineHeight - fontSize * 0.3);

      ctx.font = (isKo ? "600 " : "500 ") + fontSize + "px " + fontFamily;
      ctx.fillStyle = "#F7F5EC";
      lines.forEach(function (line, i) {
        ctx.fillText(line, pad, startY + i * lineHeight);
      });
    }
  }

  function renderDotsMarkup(count, activeIndex) {
    var html = "";
    for (var i = 0; i < count; i++) {
      html += '<span class="kb-dot' + (i === activeIndex ? " active" : "") + '" data-dot></span>';
    }
    return html;
  }

  function updatePlayerDots() {
    var dots = document.querySelectorAll("#kb-dots .kb-dot");
    dots.forEach(function (d, i) { d.classList.toggle("active", i === state.player.index); });
  }

  // Used when the number of scenes itself changes (switching subtitle language changes
  // which flashcards are included), since updatePlayerDots() above only toggles the
  // active class on however many dot elements already exist in the DOM.
  function rebuildPlayerDots() {
    var container = document.getElementById("kb-dots");
    if (container) container.innerHTML = renderDotsMarkup(state.player.scenes.length, state.player.index);
  }

  function stepPlayer(ts) {
    if (!state.player.active) { playerRAF = null; return; }
    if (playerLastTs === null) playerLastTs = ts;
    var delta = ts - playerLastTs;
    playerLastTs = ts;

    var advancing = state.player.exporting || state.player.playing;
    if (advancing) playerElapsed += delta;

    var scenes = state.player.scenes;
    var scene = scenes[state.player.index];
    if (!scene) { playerRAF = null; return; }

    var isFlashcard = scene.kind === "expr" || scene.kind === "vocab" || scene.kind === "kr-expr" || scene.kind === "kr-vocab";
    var duration;
    if (scene.kind === "intro") {
      duration = Math.max(5000, Math.min(20000, 1200 + (scene.text || "").length * 100));
    } else if (isFlashcard) {
      duration = 3600;
    } else {
      duration = computeSceneDurationMs(getSceneCaption(scene, state.player.subtitleLang), state.player.subtitleLang);
    }
    var t = Math.min(1, playerElapsed / duration);

    drawPlayerFrame(scene, t, state.player.index);

    if (state.player.exporting) {
      var overall = (state.player.index + t) / scenes.length;
      var bar = document.getElementById("kb-export-bar");
      if (bar) bar.style.width = Math.round(overall * 100) + "%";
      var label = document.getElementById("kb-export-label");
      if (label) label.textContent = "녹화 중… " + Math.min(state.player.index + 1, scenes.length) + " / " + scenes.length + "장면";
    }

    if (t >= 1 && advancing) {
      playerElapsed = 0;
      if (state.player.index < scenes.length - 1) {
        state.player.index++;
        updatePlayerDots();
        if (audioCtx) playSceneTransitionAccent(audioCtx.currentTime + 0.02);
      } else if (state.player.exporting) {
        finishExportRecording();
        return;
      } else {
        state.player.index = 0;
        updatePlayerDots();
        if (audioCtx) playSceneTransitionAccent(audioCtx.currentTime + 0.02);
      }
    }

    playerRAF = requestAnimationFrame(stepPlayer);
  }

  function preloadPlayerImages(scenes) {
    playerImages = scenes.map(function () { return null; });
    return Promise.all(scenes.map(function (s, i) {
      return new Promise(function (resolve) {
        if (!s.image) { resolve(); return; }
        var img = new Image();
        img.onload = function () { playerImages[i] = img; resolve(); };
        img.onerror = function () { resolve(); };
        img.src = s.image;
      });
    }));
  }

  function startPlayerLoop() {
    playerCanvas = document.getElementById("kb-canvas");
    if (!playerCanvas) return;
    playerCtx = playerCanvas.getContext("2d");
    if (playerRAF) cancelAnimationFrame(playerRAF);
    playerElapsed = 0;
    playerLastTs = null;
    playerRAF = requestAnimationFrame(stepPlayer);
  }

  // ---------------------------------------------------------------------
  // Generative ambient background music (Web Audio API only — no external
  // audio files or APIs, so it's free and works offline). A soft pentatonic
  // pad layer plus sparse plucked notes, scheduled a couple seconds ahead
  // of playback. The same graph feeds both the speakers (live preview) and
  // a MediaStreamAudioDestinationNode, which gets muxed into the exported
  // video's audio track during MP4/WebM recording.
  // ---------------------------------------------------------------------

  var PENTATONIC = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25]; // C4 D4 E4 G4 A4 C5

  function startPlayerAudio() {
    if (audioCtx) return;
    var Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    try {
      audioCtx = new Ctx();
      if (audioCtx.state === "suspended") audioCtx.resume();

      audioMasterGain = audioCtx.createGain();
      audioMasterGain.gain.value = audioMuted ? 0 : 0.5;

      var filter = audioCtx.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.value = 3400;

      audioDestNode = audioCtx.createMediaStreamDestination();
      audioMasterGain.connect(filter);
      filter.connect(audioCtx.destination);
      filter.connect(audioDestNode);

      audioNextPadTime = audioCtx.currentTime + 0.2;
      audioNextPluckTime = audioCtx.currentTime + 2;
      transitionNoteIndex = 0;
      audioScheduler = setInterval(scheduleAmbientAudio, 400);
      scheduleAmbientAudio();
    } catch (e) {
      stopPlayerAudio();
    }
  }

  function scheduleAmbientAudio() {
    if (!audioCtx) return;
    var now = audioCtx.currentTime;
    var lookahead = 2.0;
    while (audioNextPadTime < now + lookahead) {
      playAmbientPad(audioNextPadTime);
      audioNextPadTime += 7 + Math.random() * 3;
    }
    while (audioNextPluckTime < now + lookahead) {
      playAmbientPluck(audioNextPluckTime);
      audioNextPluckTime += 2 + Math.random() * 2.5;
    }
  }

  function playAmbientPad(startTime) {
    var root = PENTATONIC[Math.floor(Math.random() * 3)]; // brighter register (no octave-down)
    var dur = 8;
    [root, root * 1.5, root * 2].forEach(function (freq, i) {
      var osc = audioCtx.createOscillator();
      osc.type = i === 2 ? "triangle" : "sine"; // top voice gets a touch more harmonic sparkle
      osc.frequency.value = freq;
      var g = audioCtx.createGain();
      var peak = 0.07 - i * 0.014;
      g.gain.setValueAtTime(0, startTime);
      g.gain.linearRampToValueAtTime(peak, startTime + dur * 0.3);
      g.gain.linearRampToValueAtTime(0, startTime + dur);
      osc.connect(g);
      g.connect(audioMasterGain);
      osc.start(startTime);
      osc.stop(startTime + dur + 0.1);
    });
  }

  function playAmbientPluck(startTime) {
    var octaveUp = Math.random() < 0.4 ? 2 : 1;
    var freq = PENTATONIC[Math.floor(Math.random() * PENTATONIC.length)] * octaveUp;
    var osc = audioCtx.createOscillator();
    osc.type = "triangle";
    osc.frequency.value = freq;
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0, startTime);
    g.gain.linearRampToValueAtTime(0.12, startTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, startTime + 2.0);
    osc.connect(g);
    g.connect(audioMasterGain);
    osc.start(startTime);
    osc.stop(startTime + 2.1);
  }

  // A brighter, more prominent chime played right on scene transitions (as opposed to
  // the quiet, randomly-timed ambient plucks above). Notes step through the pentatonic
  // scale one octave up, so the sequence of transitions across a slideshow feels like a
  // simple ascending/wrapping melody rather than random noise.
  function playSceneTransitionAccent(startTime) {
    if (!audioCtx || !audioMasterGain) return;
    var freq = PENTATONIC[transitionNoteIndex % PENTATONIC.length] * 2;
    transitionNoteIndex++;

    var osc = audioCtx.createOscillator();
    osc.type = "sine";
    osc.frequency.value = freq;
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0, startTime);
    g.gain.linearRampToValueAtTime(0.16, startTime + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, startTime + 1.1);
    osc.connect(g);
    g.connect(audioMasterGain);
    osc.start(startTime);
    osc.stop(startTime + 1.2);

    var shimmer = audioCtx.createOscillator();
    shimmer.type = "triangle";
    shimmer.frequency.value = freq * 1.5;
    var gs = audioCtx.createGain();
    gs.gain.setValueAtTime(0, startTime);
    gs.gain.linearRampToValueAtTime(0.06, startTime + 0.008);
    gs.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.7);
    shimmer.connect(gs);
    gs.connect(audioMasterGain);
    shimmer.start(startTime);
    shimmer.stop(startTime + 0.8);

    // A single soft echo tap for a bit of chime tail (poor man's delay).
    var echo = audioCtx.createOscillator();
    echo.type = "sine";
    echo.frequency.value = freq;
    var ge = audioCtx.createGain();
    ge.gain.setValueAtTime(0, startTime + 0.16);
    ge.gain.linearRampToValueAtTime(0.05, startTime + 0.17);
    ge.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.9);
    echo.connect(ge);
    ge.connect(audioMasterGain);
    echo.start(startTime + 0.16);
    echo.stop(startTime + 1.0);
  }

  function stopPlayerAudio() {
    if (audioScheduler) { clearInterval(audioScheduler); audioScheduler = null; }
    if (audioCtx) { try { audioCtx.close(); } catch (e) {} }
    audioCtx = null;
    audioMasterGain = null;
    audioDestNode = null;
  }

  function togglePlayerAudioMute() {
    audioMuted = !audioMuted;
    if (audioMasterGain && audioCtx) {
      audioMasterGain.gain.linearRampToValueAtTime(audioMuted ? 0 : 0.5, audioCtx.currentTime + 0.2);
    }
    return audioMuted;
  }

  function openPlayer(result) {
    var initialLang = "ko";
    var usable = buildPlayableScenes(result || {}, initialLang);
    if (usable.length === 0) usable = buildPlayableScenes(result || {}, null);
    if (usable.length === 0) return;
    state.player = {
      active: true,
      scenes: usable,
      subtitleLang: initialLang,
      index: 0,
      playing: true,
      exporting: false,
      exportDone: false,
      exportError: "",
      videoUrl: "",
      videoExt: "webm",
      muted: audioMuted,
    };
    render();
    startPlayerAudio();
    var fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
    fontsReady.then(function () { return preloadPlayerImages(usable); }).then(function () {
      if (!state.player.active) return; // closed before images finished loading
      startPlayerLoop();
    });
  }

  function closePlayer() {
    if (mediaRecorder) {
      mediaRecorder.onstop = null;
      if (mediaRecorder.state !== "inactive") { try { mediaRecorder.stop(); } catch (e) {} }
      mediaRecorder = null;
    }
    if (playerRAF) { cancelAnimationFrame(playerRAF); playerRAF = null; }
    stopPlayerAudio();
    if (state.player.videoUrl) URL.revokeObjectURL(state.player.videoUrl);
    exportedVideoBlob = null;
    state.player = { active: false, scenes: [], subtitleLang: "ko", index: 0, playing: false, exporting: false, exportDone: false, exportError: "", videoUrl: "", videoExt: "webm", muted: audioMuted };
    playerCanvas = null; playerCtx = null; playerImages = [];
    render();
  }

  function pickRecorderMimeType() {
    var candidates = [
      "video/mp4;codecs=avc1.42E01E,mp4a.40.2",
      "video/mp4;codecs=avc1.42E01E",
      "video/mp4",
      "video/webm;codecs=vp9,opus",
      "video/webm;codecs=vp9",
      "video/webm;codecs=vp8",
      "video/webm",
    ];
    for (var i = 0; i < candidates.length; i++) {
      if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(candidates[i])) return candidates[i];
    }
    return "";
  }

  function startExport() {
    if (!state.player.active || state.player.exporting) return;
    var mimeType = pickRecorderMimeType();
    if (!mimeType || !window.MediaRecorder) {
      state.player.exportError = "이 브라우저는 동영상 녹화를 지원하지 않아요. 최신 Chrome이나 Safari에서 시도해주세요.";
      render();
      return;
    }
    state.player.exporting = true;
    state.player.exportDone = false;
    state.player.exportError = "";
    state.player.index = 0;
    state.player.playing = true;
    render(); // switches the modal into export mode — recreates the canvas, so reacquire it below

    requestAnimationFrame(function () {
      playerCanvas = document.getElementById("kb-canvas");
      if (!playerCanvas) return;
      playerCtx = playerCanvas.getContext("2d");
      var videoStream = playerCanvas.captureStream(30);
      var combinedStream = videoStream;
      if (audioDestNode && audioDestNode.stream.getAudioTracks().length > 0) {
        combinedStream = new MediaStream(
          videoStream.getVideoTracks().concat(audioDestNode.stream.getAudioTracks())
        );
      }
      recordedChunks = [];
      try {
        mediaRecorder = new MediaRecorder(combinedStream, { mimeType: mimeType, videoBitsPerSecond: 4000000 });
      } catch (e) {
        state.player.exporting = false;
        state.player.exportError = "녹화를 시작하지 못했어요: " + ((e && e.message) || "");
        render();
        return;
      }
      mediaRecorder.ondataavailable = function (e) { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = function () {
        var blob = new Blob(recordedChunks, { type: mimeType.split(";")[0] });
        var url = URL.createObjectURL(blob);
        exportedVideoBlob = blob;
        state.player.exporting = false;
        state.player.exportDone = true;
        state.player.videoUrl = url;
        state.player.videoExt = mimeType.indexOf("mp4") !== -1 ? "mp4" : "webm";
        render();
      };
      mediaRecorder.start();
      playerElapsed = 0;
      playerLastTs = null;
      if (playerRAF) cancelAnimationFrame(playerRAF);
      playerRAF = requestAnimationFrame(stepPlayer);
    });
  }

  function finishExportRecording() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
      mediaRecorder.stop(); // onstop handler above finalizes the blob + re-renders
    }
    if (playerRAF) { cancelAnimationFrame(playerRAF); playerRAF = null; }
  }

  function cancelExport() {
    if (mediaRecorder) {
      mediaRecorder.onstop = null;
      if (mediaRecorder.state !== "inactive") { try { mediaRecorder.stop(); } catch (e) {} }
      mediaRecorder = null;
    }
    if (playerRAF) { cancelAnimationFrame(playerRAF); playerRAF = null; }
    state.player.exporting = false;
    state.player.index = 0;
    state.player.playing = true;
    transitionNoteIndex = 0;
    render();
    requestAnimationFrame(startPlayerLoop);
  }

  function replayPlayer() {
    state.player.exportDone = false;
    state.player.exportError = "";
    if (state.player.videoUrl) { URL.revokeObjectURL(state.player.videoUrl); state.player.videoUrl = ""; }
    exportedVideoBlob = null;
    state.player.index = 0;
    state.player.playing = true;
    transitionNoteIndex = 0;
    render();
    requestAnimationFrame(startPlayerLoop);
  }

  function shareExportedVideo() {
    if (!exportedVideoBlob) return;
    var mime = state.player.videoExt === "mp4" ? "video/mp4" : "video/webm";
    var filename = "scenes." + state.player.videoExt;
    try {
      var file = new File([exportedVideoBlob], filename, { type: mime });
      if (navigator.canShare && !navigator.canShare({ files: [file] })) {
        state.player.exportError = "이 브라우저는 동영상 공유를 지원하지 않아요. 다운로드 버튼을 사용해주세요.";
        render();
        return;
      }
      navigator.share({ files: [file], title: "장면 슬라이드쇼" }).catch(function () {
        // Silently ignore — this also fires when the user just cancels the share sheet.
      });
    } catch (e) {
      state.player.exportError = "공유 중 문제가 발생했어요: " + ((e && e.message) || "");
      render();
    }
  }

  function renderPlayerModal() {
    var p = state.player;

    if (p.exportDone) {
      var canShareVideo = typeof navigator !== "undefined" && !!navigator.share;
      var shareBtn = canShareVideo
        ? '<button class="btn" data-action="player-share-video">📤 공유/저장하기</button>'
        : "";
      return (
        '<div class="modal-backdrop">' +
          '<div class="kb-modal card">' +
            '<div class="kb-canvas-wrap">' +
              '<video src="' + p.videoUrl + '" controls playsinline style="width:100%;height:100%;object-fit:contain;background:#000;"></video>' +
            "</div>" +
            '<div class="kb-result-actions">' +
              shareBtn +
              '<a class="' + (canShareVideo ? "btn-ghost" : "btn") + '" href="' + p.videoUrl + '" download="scenes.' + p.videoExt + '">⬇ 다운로드 (' + p.videoExt.toUpperCase() + ")</a>" +
              '<button class="btn-ghost" data-action="player-replay">다시 재생</button>' +
              '<button class="btn-ghost" data-action="close-player">닫기</button>' +
            "</div>" +
            (p.exportError ? '<p class="err" style="margin-top:10px;">' + escapeHtml(p.exportError) + "</p>" : "") +
            (canShareVideo
              ? '<p class="kb-note">Safari 등 일부 브라우저는 다운로드 버튼이 바로 동작하지 않을 수 있어요 — 그럴 땐 공유 버튼을 눌러 "비디오 저장"을 선택해주세요.</p>'
              : "") +
            (p.videoExt === "webm"
              ? '<p class="kb-note">이 브라우저는 MP4 녹화를 지원하지 않아 WebM으로 저장됐어요. 대부분의 플레이어와 SNS 업로드에서 재생 가능합니다.</p>'
              : "") +
          "</div>" +
        "</div>"
      );
    }

    var dots = renderDotsMarkup(p.scenes.length, p.index);

    var langChips = [["ko", "한국어"], ["easy", "Easy English"], ["natural", "Natural English"]].map(function (pair) {
      return '<button class="kb-chip' + (p.subtitleLang === pair[0] ? " active" : "") + '" data-action="player-set-lang" data-lang="' + pair[0] + '" ' + (p.exporting ? "disabled" : "") + ">" + pair[1] + "</button>";
    }).join("");

    var controls = p.exporting
      ? (
          '<div class="kb-export-status">' +
            '<p id="kb-export-label" class="kb-export-label">녹화 중… 1 / ' + p.scenes.length + "장면</p>" +
            '<div class="kb-progress-track"><div id="kb-export-bar" class="kb-progress-fill" style="width:0%"></div></div>' +
            '<button class="btn-ghost" data-action="player-cancel-export">취소</button>' +
          "</div>"
        )
      : (
          '<div class="kb-controls">' +
            '<button class="icon-btn" data-action="player-prev" aria-label="이전 장면">⏮</button>' +
            '<button class="icon-btn" id="kb-playpause" data-action="player-toggle-play" aria-label="재생/일시정지">' + (p.playing ? "⏸" : "▶") + "</button>" +
            '<button class="icon-btn" data-action="player-next" aria-label="다음 장면">⏭</button>' +
            '<button class="icon-btn" id="kb-mute" data-action="player-toggle-mute" aria-label="배경음 켜기/끄기">' + (p.muted ? "🔇" : "🔊") + "</button>" +
          "</div>" +
          '<div class="kb-dots" id="kb-dots">' + dots + "</div>" +
          '<div class="kb-lang-row">' + langChips + "</div>" +
          (p.exportError ? '<p class="err" style="margin-top:10px;">' + escapeHtml(p.exportError) + "</p>" : "") +
          '<button class="btn" style="margin-top:14px; width:100%; justify-content:center;" data-action="player-export">🎬 MP4로 내보내기</button>'
        );

    return (
      '<div class="modal-backdrop">' +
        '<div class="kb-modal card">' +
          '<div class="kb-modal-head">' +
            '<p class="kb-modal-title kr">장면 재생</p>' +
            '<button class="icon-btn" data-action="close-player" aria-label="닫기">✕</button>' +
          "</div>" +
          '<div class="kb-canvas-wrap"><canvas id="kb-canvas" width="1280" height="720"></canvas></div>' +
          controls +
        "</div>" +
      "</div>"
    );
  }

  // ---------------------------------------------------------------------
  // Events
  // ---------------------------------------------------------------------

  function bindEvents() {
    var koreanInput = document.getElementById("korean-input");
    if (koreanInput) koreanInput.addEventListener("input", function (e) { state.newEntry.korean = e.target.value; });

    var titleInput = document.getElementById("title-input");
    if (titleInput) titleInput.addEventListener("input", function (e) { state.newEntry.title = e.target.value; });

    var photoInput = document.getElementById("photo-input");
    if (photoInput) photoInput.addEventListener("change", handlePhotoInputChange);

    app.addEventListener("click", handleClick);
  }

  function handleClick(e) {
    var target = e.target.closest("[data-action]");
    if (!target) return;
    var action = target.getAttribute("data-action");

    if (action === "start-new") {
      state.newEntry = { title: "", korean: "", photos: [] };
      state.result = null;
      state.genErr = "";
      state.resultTab = "easy";
      state.view = "new";
      render();
    } else if (action === "go-home") {
      state.view = "home";
      state.activeEntry = null;
      render();
    } else if (action === "open-settings") {
      state.showSettings = true;
      render();
    } else if (action === "close-settings" || action === "close-settings-backdrop") {
      state.showSettings = false;
      render();
    } else if (action === "save-settings") {
      var secret = document.getElementById("settings-secret").value;
      var model = document.getElementById("settings-model").value.trim() || "gemini-flash-latest";
      state.settings = { appSecret: secret, model: model };
      saveSettings();
      state.showSettings = false;
      render();
    } else if (action === "add-photo") {
      var input = document.getElementById("photo-input");
      if (input) input.click();
    } else if (action === "remove-photo") {
      var idx = parseInt(target.getAttribute("data-idx"), 10);
      state.newEntry.photos.splice(idx, 1);
      render();
    } else if (action === "generate") {
      handleGenerate();
    } else if (action === "set-tab") {
      state.resultTab = target.getAttribute("data-tab");
      render();
    } else if (action === "save-entry") {
      handleSaveEntry();
    } else if (action === "discard-result") {
      state.result = null;
      render();
    } else if (action === "open-entry") {
      var id = target.getAttribute("data-id");
      state.activeEntry = state.entries.find(function (en) { return en.id === id; }) || null;
      state.resultTab = "easy";
      state.view = "detail";
      render();
    } else if (action === "delete-entry") {
      var delId = target.getAttribute("data-id");
      state.entries = state.entries.filter(function (en) { return en.id !== delId; });
      saveEntries();
      state.activeEntry = null;
      state.view = "home";
      render();
    } else if (action === "open-player") {
      openPlayer(activeResultForPlayer);
    } else if (action === "close-player") {
      closePlayer();
    } else if (action === "player-toggle-play") {
      state.player.playing = !state.player.playing;
      var playBtn = document.getElementById("kb-playpause");
      if (playBtn) playBtn.textContent = state.player.playing ? "⏸" : "▶";
    } else if (action === "player-toggle-mute") {
      state.player.muted = togglePlayerAudioMute();
      var muteBtn = document.getElementById("kb-mute");
      if (muteBtn) muteBtn.textContent = state.player.muted ? "🔇" : "🔊";
    } else if (action === "player-prev") {
      state.player.index = (state.player.index - 1 + state.player.scenes.length) % state.player.scenes.length;
      playerElapsed = 0; playerLastTs = null;
      updatePlayerDots();
      if (audioCtx) playSceneTransitionAccent(audioCtx.currentTime + 0.02);
    } else if (action === "player-next") {
      state.player.index = (state.player.index + 1) % state.player.scenes.length;
      playerElapsed = 0; playerLastTs = null;
      updatePlayerDots();
      if (audioCtx) playSceneTransitionAccent(audioCtx.currentTime + 0.02);
    } else if (action === "player-set-lang") {
      var newLang = target.getAttribute("data-lang");
      state.player.subtitleLang = newLang;
      document.querySelectorAll('[data-action="player-set-lang"]').forEach(function (el) {
        el.classList.toggle("active", el.getAttribute("data-lang") === newLang);
      });
      if (activeResultForPlayer) {
        var rebuilt = buildPlayableScenes(activeResultForPlayer, newLang);
        if (rebuilt.length > 0) {
          state.player.scenes = rebuilt;
          while (playerImages.length < rebuilt.length) playerImages.push(null);
          if (state.player.index >= rebuilt.length) state.player.index = rebuilt.length - 1;
          playerElapsed = 0; playerLastTs = null;
          rebuildPlayerDots();
        }
      }
    } else if (action === "player-export") {
      startExport();
    } else if (action === "player-cancel-export") {
      cancelExport();
    } else if (action === "player-share-video") {
      shareExportedVideo();
    } else if (action === "player-replay") {
      replayPlayer();
    }
  }

  function handlePhotoInputChange(e) {
    var files = Array.from(e.target.files || []);
    e.target.value = "";
    var toProcess = files.filter(function (f) { return f.type.indexOf("image/") === 0; });
    if (toProcess.length === 0) return;
    Promise.all(toProcess.map(resizeImageFile)).then(function (results) {
      var used = totalPhotoBytes(state.newEntry.photos);
      var accepted = [];
      var skipped = 0;
      results.forEach(function (r) {
        if (used + r.length <= TOTAL_PHOTO_BYTES_LIMIT) {
          used += r.length;
          accepted.push(r);
        } else {
          skipped++;
        }
      });
      state.newEntry.photos = state.newEntry.photos.concat(accepted);
      if (skipped > 0) {
        state.genErr = "용량 한도(" + (TOTAL_PHOTO_BYTES_LIMIT / (1024 * 1024)).toFixed(0) + "MB)를 넘어 사진 " + skipped + "장은 첨부되지 않았어요. 사진을 좀 더 작은 걸로 시도해보세요.";
      }
      render();
    }).catch(function (err) {
      state.genErr = err.message || "사진을 처리하지 못했습니다.";
      render();
    });
  }

  function handleGenerate() {
    if (!state.newEntry.korean.trim()) {
      state.genErr = "한국어 일기를 먼저 작성해주세요.";
      render();
      return;
    }
    state.genErr = "";
    state.generating = true;
    render();
    callServer(state.newEntry.korean.trim(), state.newEntry.photos).then(function (result) {
      state.result = result;
      state.resultTab = "easy";
      if (!state.newEntry.title.trim()) {
        state.newEntry.title = result.youtubeTitle ? String(result.youtubeTitle).replace(/^["']|["']$/g, "") : "제목 없음";
      }
      state.generating = false;
      render();
    }).catch(function (err) {
      state.genErr = err.message || "생성 중 문제가 발생했어요. 다시 시도해주세요.";
      if (state.genErr.indexOf("Unauthorized") !== -1 || state.genErr.indexOf("비밀번호") !== -1) {
        state.showSettings = true;
      }
      state.generating = false;
      render();
    });
  }

  function handleSaveEntry() {
    if (!state.result) return;
    state.saving = true;
    render();
    var entry = Object.assign({
      id: String(Date.now()),
      date: todayStr(),
      title: state.newEntry.title.trim() || "제목 없음",
      photos: state.newEntry.photos,
      korean: state.newEntry.korean,
      createdAt: new Date().toISOString(),
    }, state.result);
    state.entries = [entry].concat(state.entries);
    saveEntries();
    state.saving = false;
    state.result = null;
    state.newEntry = { title: "", korean: "", photos: [] };
    state.view = "home";
    render();
  }

  // ---------------------------------------------------------------------
  // Init
  // ---------------------------------------------------------------------

  loadEntries();
  loadSettings();
  render();
})();
</script>
</body>
</html>
